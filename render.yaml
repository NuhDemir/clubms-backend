services:
  # Backend API
  - type: web
    name: clubms-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000
      
      - key: DATABASE_URL
        fromDatabase:
          name: clubms-db
          property: connectionString
      
      - key: REDIS_URL
        fromService:
          type: redis
          name: clubms-redis
          property: connectionString
      
      # Firebase credentials (add these in Render dashboard)
      - key: FIREBASE_PROJECT_ID
        sync: false
      
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      
      # QR Code Security
      - key: QR_SECRET_BASE
        generateValue: true
      
      # CORS
      - key: CORS_ORIGIN
        value: "*"
    
    autoDeploy: true

  # Redis Cache
  - type: redis
    name: clubms-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: clubms-db
    databaseName: clubms
    user: clubms_user
    plan: free
    region: frankfurt
