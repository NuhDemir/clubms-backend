paths:
  /api/v1/users:
    get:
      tags:
        - Users
      summary: Tüm kullanıcıları listele
      description: Sadece SUPER_ADMIN erişebilir
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Kullanıcı listesi
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /api/v1/users/{id}:
    get:
      tags:
        - Users
      summary: Kullanıcı detayı
      description: Belirli bir kullanıcının bilgilerini getirir
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Kullanıcı ID
      responses:
        '200':
          description: Kullanıcı bilgisi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/users/{id}/suspend:
    patch:
      tags:
        - Users
      summary: Kullanıcıyı askıya al/aktifleştir
      description: Sadece SUPER_ADMIN erişebilir
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Kullanıcı ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - isSuspended
              properties:
                isSuspended:
                  type: boolean
                  example: true
      responses:
        '200':
          description: İşlem başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
