components:
  schemas:
    # ==================== USER SCHEMAS ====================
    
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        firebaseUid:
          type: string
          example: "firebase-uid-123"
        email:
          type: string
          format: email
          example: "user@example.com"
        displayName:
          type: string
          example: "Ahmet Yılmaz"
        photoURL:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/photo.jpg"
        studentId:
          type: string
          nullable: true
          example: "2020123456"
        department:
          type: string
          nullable: true
          example: "Bilgisayar Mühendisliği"
        phoneNumber:
          type: string
          nullable: true
          example: "+905551234567"
        isSuspended:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
    
    RegisterUserDto:
      type: object
      required:
        - email
        - password
        - displayName
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "password123"
        displayName:
          type: string
          minLength: 2
          maxLength: 100
          example: "Ahmet Yılmaz"
        studentId:
          type: string
          nullable: true
          example: "2020123456"
        department:
          type: string
          nullable: true
          example: "Bilgisayar Mühendisliği"
        phoneNumber:
          type: string
          nullable: true
          example: "+905551234567"
    
    LoginUserDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "password123"
    
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Giriş başarılı"
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              example: "firebase-id-token"
    
    # ==================== ROLE SCHEMAS ====================
    
    GlobalRoleAssignment:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        role:
          $ref: '#/components/schemas/GlobalRole'
        assignedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
    
    AssignGlobalRoleDto:
      type: object
      required:
        - userId
        - role
      properties:
        userId:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        role:
          $ref: '#/components/schemas/GlobalRole'
