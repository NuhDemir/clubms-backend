name: Deploy to Render

on:
  push:
    branches:
      - main
      - production
  
  workflow_dispatch: # Manuel deploy için

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: clubms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Run Prisma Migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/clubms_test
        run: npx prisma migrate deploy
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Check build output
        run: |
          echo "✅ Build completed successfully"
          ls -la dist/
      
      # Uncomment when tests are ready
      # - name: Run tests
      #   env:
      #     DATABASE_URL: postgresql://test:test@localhost:5432/clubms_test
      #     REDIS_HOST: localhost
      #     REDIS_PORT: 6379
      #   run: npm test
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
  
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Render
        run: |
          echo "🚀 Deploying to Render..."
          echo "Render will automatically deploy from this push"
          echo "Monitor deployment at: https://dashboard.render.com"
      
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 60 seconds for deployment to complete..."
          sleep 60
      
      - name: Health check
        run: |
          echo "🏥 Checking service health..."
          
          max_attempts=10
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_SERVICE_URL }}/health || echo "000")
            
            if [ "$response" = "200" ]; then
              echo "✅ Service is healthy! (HTTP $response)"
              exit 0
            fi
            
            attempt=$((attempt + 1))
            echo "⏳ Attempt $attempt/$max_attempts - Service returned HTTP $response, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Service health check failed after $max_attempts attempts"
          exit 1
      
      - name: Deployment success
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "API URL: ${{ secrets.RENDER_SERVICE_URL }}"
          echo "API Docs: ${{ secrets.RENDER_SERVICE_URL }}/api-docs"
